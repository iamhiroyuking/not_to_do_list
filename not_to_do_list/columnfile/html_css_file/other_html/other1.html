<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                <style>
                    body { font-family: -apple-system, sans-serif; padding: 20px; color: #333; line-height: 1.7; }
                    h1 { font-size: 22px; border-bottom: 2px solid #007AFF; padding-bottom: 8px; margin-bottom: 20px; }
                    h2 { font-size: 18px; color: #007AFF; margin-top: 24px; margin-bottom: 12px; }
                    p { font-size: 15px; color: #444; margin-bottom: 16px; }
                    .highlight { background: linear-gradient(transparent 60%, #fff89e 60%); font-weight: bold; }
                    .dummy-badge { display: inline-block; background-color: #E5E5EA; color: #8E8E93; padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
                </style>
    </head>
    <body>
        <span class="dummy-badge">準備中</span>
        <h1>準備中のコラム</h1>
        <p>こちらのコラムは現在コンテンツを作成中です。</p>
        
        <h2>追加予定のテーマ</h2>
        <p>この「他にも知ろう」のセクションでは、自己管理やマインドセットに役立つおすすめの書籍（例えば『利己的な遺伝子』などの名著）の紹介や、モチベーションを高める名言などを配信していく予定です。</p>
        <p><span class="highlight">今後のアップデートをお楽しみに！</span></p>
    </body>
</html>
